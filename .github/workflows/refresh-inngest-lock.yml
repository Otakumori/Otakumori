name: Refresh Inngest lockfile

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/refresh-inngest-lock.yml
      - pnpm-workspace.yaml
      - .npmrc
      - package.json

permissions:
  contents: write

jobs:
  refresh-inngest-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.12'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.1 --activate

      - name: Upgrade Inngest and regenerate lockfile
        run: |
          pnpm add inngest@3.54.0
          pnpm install
          pnpm prisma generate

      - name: Commit dependency refresh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml pnpm-workspace.yaml .npmrc
          if git diff --cached --quiet; then
            echo "No dependency changes to commit."
          else
            git commit -m "fix(deps): upgrade inngest security patch"
            git push
          fi

      - name: Verify build
        run: pnpm build
