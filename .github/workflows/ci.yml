name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.20.2'
  PNPM_VERSION: '10.15.1'
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/otakumori_ci
  DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/otakumori_ci
  STRIPE_SECRET_KEY: sk_test_ci_placeholder
  STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
  STRIPE_WEBHOOK_FULFILLMENT_DRY_RUN: 'true'
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
  CLERK_SECRET_KEY: sk_test_ci_placeholder
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2ktdGVzdC5jbGVyay5hY2NvdW50cy5kZXYk
  PRINTIFY_API_KEY: ci-read-disabled
  PRINTIFY_SHOP_ID: ci-read-disabled
  UPSTASH_REDIS_REST_URL: https://ci.invalid
  UPSTASH_REDIS_REST_TOKEN: ci-read-disabled
  EMAIL_DRY_RUN: 'true'
  EMAIL_SEND_ENABLED: 'false'
  FULFILLMENT_PROVIDER: disabled
  FULFILLMENT_DRY_RUN: 'true'

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Mini-Games QA Validation
        id: mini-games-qa
        run: pnpm run mini-games:qa
        continue-on-error: true

      - name: Run unit tests
        id: unit-tests
        run: pnpm exec vitest run --reporter=json --outputFile=vitest-results.json
        continue-on-error: true

      - name: Enforce unit-test failure baseline
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const knownFailingFiles = new Set([
            '__tests__/api/adults/catalog.test.ts',
            '__tests__/api/adults/purchase.test.ts',
            '__tests__/api/cart.test.ts',
            '__tests__/api/printify.route.test.ts',
            '__tests__/api/v1/avatar/export-health.test.ts',
            '__tests__/api/v1/avatar/export-integration.test.ts',
            '__tests__/api/v1/avatar/export-status.test.ts',
            '__tests__/api/v1/avatar/export.test.ts',
            '__tests__/api/v1/avatar/save.test.ts',
            '__tests__/auth/integration.test.ts',
            '__tests__/components/InteractivePetals.test.tsx',
            '__tests__/integration/payment-flows.test.ts',
            '__tests__/lib/safeFetch.test.ts',
            '__tests__/lib/telemetry.test.ts',
            'app/lib/avatar/__tests__/validate.test.ts',
            'packages/avatar/src/__tests__/spec.test.ts',
          ]);

          if (!fs.existsSync('vitest-results.json')) {
            console.error('Vitest did not produce a results file.');
            process.exit(1);
          }

          const report = JSON.parse(fs.readFileSync('vitest-results.json', 'utf8'));
          const failingFiles = (report.testResults ?? [])
            .filter((result) => result.status === 'failed')
            .map((result) => path.relative(process.cwd(), result.name).replaceAll('\\', '/'))
            .sort();
          const unexpected = failingFiles.filter((file) => !knownFailingFiles.has(file));

          if (unexpected.length > 0) {
            console.error(`Unexpected failing test files: ${unexpected.join(', ')}`);
            process.exit(1);
          }

          if (failingFiles.length > 0) {
            console.warn(
              `Known test debt remains in ${failingFiles.length} files; no new failing file was introduced.`,
            );
          }
          NODE

      - name: Report advisory QA debt
        if: always() && steps.mini-games-qa.outcome == 'failure'
        run: echo "::warning::Mini-game QA still targets obsolete route paths and remains advisory."

  build:
    name: Build & Bundle Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build
        env:
          NEXT_PUBLIC_FEATURE_HERO: '1'
          NEXT_PUBLIC_FEATURE_PETALS_INTERACTIVE: '1'
          NEXT_PUBLIC_FEATURE_SHOP: '1'
          NEXT_PUBLIC_FEATURE_MINIGAMES: 'on'
          NEXT_PUBLIC_FEATURE_BLOG: '1'
          NEXT_PUBLIC_FEATURE_SOAPSTONES: '1'
          NEXT_PUBLIC_LIVE_DATA: '0'
          NEXT_PUBLIC_PROBE_MODE: '1'

      - name: Analyze bundle size
        run: |
          pnpm run build -- --analyze
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: .next/
          include-hidden-files: true
          retention-days: 1

  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: .next/

      - name: Start Next.js server
        run: |
          pnpm run start &
          sleep 30
        env:
          PORT: 3000
          NEXT_PUBLIC_FEATURE_HERO: '1'
          NEXT_PUBLIC_FEATURE_PETALS_INTERACTIVE: '1'
          NEXT_PUBLIC_FEATURE_SHOP: '1'
          NEXT_PUBLIC_FEATURE_MINIGAMES: 'on'
          NEXT_PUBLIC_FEATURE_BLOG: '1'
          NEXT_PUBLIC_FEATURE_SOAPSTONES: '1'
          NEXT_PUBLIC_LIVE_DATA: '0'
          NEXT_PUBLIC_PROBE_MODE: '1'

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './lighthouserc.js'
          uploadArtifacts: true
          temporaryPublicStorage: true

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: .next/

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Start Next.js server
        run: |
          pnpm run start &
          sleep 30
        env:
          PORT: 3000
          NEXT_PUBLIC_FEATURE_HERO: '1'
          NEXT_PUBLIC_FEATURE_PETALS_INTERACTIVE: '1'
          NEXT_PUBLIC_FEATURE_SHOP: '1'
          NEXT_PUBLIC_FEATURE_MINIGAMES: 'on'
          NEXT_PUBLIC_FEATURE_BLOG: '1'
          NEXT_PUBLIC_FEATURE_SOAPSTONES: '1'
          NEXT_PUBLIC_LIVE_DATA: '0'
          NEXT_PUBLIC_PROBE_MODE: '1'

      - name: Run Playwright tests
        run: pnpm exec playwright test
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        id: security-audit
        run: pnpm audit --json > pnpm-audit.json
        continue-on-error: true

      # Hard gate: any critical advisory fails the job. This runs WITHOUT
      # continue-on-error so critical vulnerabilities can no longer be silently
      # absorbed by the advisory baseline below.
      - name: Fail on critical advisories
        run: pnpm audit --audit-level critical

      - name: Enforce dependency advisory baseline
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const baseline = {
            low: 9,
            moderate: 86,
            high: 99,
            critical: 9,
          };

          if (!fs.existsSync('pnpm-audit.json')) {
            console.error('pnpm audit did not produce a results file.');
            process.exit(1);
          }

          const report = JSON.parse(fs.readFileSync('pnpm-audit.json', 'utf8'));
          const current = report.metadata?.vulnerabilities;

          if (!current) {
            console.error('pnpm audit results did not include vulnerability counts.');
            process.exit(1);
          }

          const regressions = Object.entries(baseline)
            .filter(([severity, maximum]) => Number(current[severity] ?? 0) > maximum)
            .map(([severity, maximum]) => `${severity}: ${current[severity]} > ${maximum}`);

          if (regressions.length > 0) {
            console.error(`Dependency advisory baseline regressed: ${regressions.join(', ')}`);
            process.exit(1);
          }

          const total = Object.values(current).reduce(
            (sum, count) => sum + Number(count ?? 0),
            0,
          );
          console.warn(
            `Known dependency debt remains (${total} advisories); no severity count increased.`,
          );
          NODE

      - name: Report outdated dependencies
        run: pnpm outdated
        continue-on-error: true
