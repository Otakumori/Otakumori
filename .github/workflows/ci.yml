name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.20.2'
  PNPM_VERSION: '9.15.9'
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/otakumori_ci
  DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/otakumori_ci
  STRIPE_SECRET_KEY: sk_test_ci_placeholder
  STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
  STRIPE_WEBHOOK_FULFILLMENT_DRY_RUN: 'true'
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
  CLERK_SECRET_KEY: sk_test_ci_placeholder
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2ktdGVzdC5jbGVyay5hY2NvdW50cy5kZXYk
  PRINTIFY_API_KEY: ci-read-disabled
  PRINTIFY_SHOP_ID: ci-read-disabled
  UPSTASH_REDIS_REST_URL: https://ci.invalid
  UPSTASH_REDIS_REST_TOKEN: ci-read-disabled
  EMAIL_DRY_RUN: 'true'
  EMAIL_SEND_ENABLED: 'false'
  FULFILLMENT_PROVIDER: disabled
  FULFILLMENT_DRY_RUN: 'true'
  NEXT_PUBLIC_FEATURE_HERO: '1'
  NEXT_PUBLIC_FEATURE_PETALS_INTERACTIVE: '1'
  NEXT_PUBLIC_FEATURE_SHOP: '1'
  NEXT_PUBLIC_FEATURE_MINIGAMES: 'on'
  NEXT_PUBLIC_FEATURE_BLOG: '1'
  NEXT_PUBLIC_FEATURE_SOAPSTONES: '1'
  NEXT_PUBLIC_LIVE_DATA: '0'
  NEXT_PUBLIC_PROBE_MODE: '1'

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Provider containment and commerce tests
        run: >-
          pnpm exec vitest run
          app/api/webhooks/printify/__tests__/signature.test.ts
          app/lib/petals/__tests__/grant-clamp.test.ts
          app/api/petals/__tests__/authority.test.ts
          app/api/v1/petals/__tests__/grant-admin.test.ts
          app/api/webhooks/stripe/__tests__/dry-run.test.ts
          app/lib/security/__tests__/providerWriteGuard.test.ts
          app/api/shop/orders/__tests__/authorization.test.ts

      - name: Commerce static checks
        run: node scripts/commerce-release-static-checks.mjs

  advisory-quality:
    name: Full Unit and Mini-game QA (Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Mini-games QA
        run: pnpm run mini-games:qa

      - name: Full unit suite
        if: always()
        run: pnpm exec vitest run --reporter=json --outputFile=vitest-results.json

      - name: Upload unit-test diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-results
          path: vitest-results.json
          if-no-files-found: ignore
          retention-days: 14

  build:
    name: Build & Bundle Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build application
        shell: bash
        run: |
          set -o pipefail
          pnpm run vercel-build 2>&1 | tee next-build.log

      - name: Upload Next build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          include-hidden-files: true
          retention-days: 1

      - name: Upload build diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: next-build-log
          path: next-build.log
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: github.event_name == 'pull_request'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Download Next build
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start application
        shell: bash
        run: |
          pnpm run start > next-server.log 2>&1 &
          echo "APP_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for application
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --silent --show-error --output /dev/null http://127.0.0.1:3000/api; then
              exit 0
            fi
            sleep 2
          done
          cat next-server.log
          exit 1

      - name: Run Playwright tests
        run: pnpm exec playwright test
        env:
          BASE_URL: http://127.0.0.1:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload E2E server log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-next-server-log
          path: next-server.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop application
        if: always()
        shell: bash
        run: |
          if [ -n "${APP_PID:-}" ]; then
            kill "$APP_PID" 2>/dev/null || true
          fi

  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.event_name == 'pull_request'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Download Next build
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/

      - name: Start application
        shell: bash
        run: |
          pnpm run start > next-server.log 2>&1 &
          echo "APP_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for application
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --silent --show-error --output /dev/null http://127.0.0.1:3000/api; then
              exit 0
            fi
            sleep 2
          done
          cat next-server.log
          exit 1

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Upload Lighthouse diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-diagnostics
          path: |
            .lighthouseci/
            next-server.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop application
        if: always()
        shell: bash
        run: |
          if [ -n "${APP_PID:-}" ]; then
            kill "$APP_PID" 2>/dev/null || true
          fi

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Capture production audit diagnostics
        shell: bash
        run: |
          set +e
          pnpm audit --prod --json > pnpm-audit.json
          exit 0

      - name: Fail on production critical advisories
        run: pnpm audit --prod --audit-level critical

      - name: Upload security diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pnpm-production-audit
          path: pnpm-audit.json
          if-no-files-found: error
          retention-days: 14
